name: runIT
on:
  workflow_call:
    inputs:
      bonita_url:
        description: 'Bonita URL (e.g. http://hostname:80/bonita). Defaults to http://<AWS_PUBLIC_DNS_HOSTNAME>:80/bonita'
        required: false
        default: ''
        type: string
      playwright_screenshots_path:
        description: 'Path to Playwright screenshots folder'
        required: false
        default: 'IT/target/playwright-screenshots/**'
        type: string
    secrets:
      JFROG_USER:
        required: true
      JFROG_TOKEN:
        required: true
      GHP_USER:
        required: true
      GHP_TOKEN:
        required: true
jobs:
  run_IT:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Setup maven private repositories
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          repositories: >
            [
              {
                "id": "bar",
                "name": "Bonita Artifact Repository",
                "url": "https://bonitasoft.jfrog.io/artifactory/releases",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "false"
                }
              },
              {
                "id": "github-presales",
                "name": "github-presales",
                "url": "https://maven.pkg.github.com/bonitasoft-presales/*",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true"
                }
              },
              {
                "id": "github-laurent",
                "name": "github-presales",
                "url": "https://maven.pkg.github.com/laurentleseigneur/*",
                "releases": {
                 "enabled": "true"
                },
                "snapshots": {
                 "enabled": "true"
                }
              }
            ]
          plugin_repositories: >
            [
              {
                "id": "bar",
                "name": "Bonita Artifact Repository",
                "url": "https://bonitasoft.jfrog.io/artifactory/releases",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "false"
                }
              }
            ]
          servers: >
            [
              {
                "id": "bar",
                "username": "${{ secrets.JFROG_USER }}",
                "password": "${{ secrets.JFROG_TOKEN }}"
              },
              {
                "id": "github-presales",
                "username": "${{ secrets.GHP_USER }}",
                "password": "${{ secrets.GHP_TOKEN }}"
              },
              {
                "id": "github-laurent",
                "username": "${{ secrets.GHP_USER }}",
                "password": "${{ secrets.GHP_TOKEN }}"
              }
            ]

      - name: Login to Jfrog
        run: docker login https://bonitasoft.jfrog.io -u ${{ secrets.JFROG_USER }} -p ${{ secrets.JFROG_TOKEN }}

      # comes from create server
      - name: Download artifact instance.yaml file
        uses: actions/download-artifact@v4
        with:
          name: aws_instance

      # comes from pre requisites
      - name: Download artifact instance.yaml file
        uses: actions/download-artifact@v4
        with:
          name: pre_requisites


      - name: read-yaml-instance-file
        uses: pietrobolcato/action-read-yaml@1.1.0
        id: read-yaml-instance-file
        with:
          config: ${{ github.workspace }}/aws_instance.yaml

      - name: read-yaml-requisite-file
        uses: pietrobolcato/action-read-yaml@1.1.0
        id: read-yaml-requisite-file
        with:
          config: ${{ github.workspace }}/pre_requisites.yaml


      - name: set env variables
        id: set-env-variable
        run: |
          echo "AWS_PUBLIC_DNS_HOSTNAME=${{ steps.read-yaml-instance-file.outputs['publicDnsName'] }}" >> $GITHUB_ENV
          echo "IT_FOLDER_EXISTS=${{ steps.read-yaml-requisite-file.outputs['IT_FOLDER_EXISTS'] }}" >> $GITHUB_ENV
          echo "DATAGEN_FOLDER_EXISTS=${{ steps.read-yaml-requisite-file.outputs['DATAGEN_FOLDER_EXISTS'] }}" >> $GITHUB_ENV
          BONITA_URL="${{ inputs.bonita_url }}"
          if [ -z "$BONITA_URL" ]; then
            BONITA_URL="http://${{ steps.read-yaml-instance-file.outputs['publicDnsName'] }}:80/bonita"
          fi
          echo "BONITA_URL=$BONITA_URL" >> $GITHUB_ENV
          echo "## runIT — Environment" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS_PUBLIC_DNS_HOSTNAME | ${{ steps.read-yaml-instance-file.outputs['publicDnsName'] }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IT_FOLDER_EXISTS | ${{ steps.read-yaml-requisite-file.outputs['IT_FOLDER_EXISTS'] }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DATAGEN_FOLDER_EXISTS | ${{ steps.read-yaml-requisite-file.outputs['DATAGEN_FOLDER_EXISTS'] }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BONITA_URL | $BONITA_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| playwright_screenshots_path | ${{ inputs.playwright_screenshots_path }} |" >> $GITHUB_STEP_SUMMARY

      - name: run integration test
        if: env.IT_FOLDER_EXISTS == 'true'
        run: |
          echo "Integration test using Bonita test toolkit"
          ./mvnw --batch-mode --no-transfer-progress clean verify \
          -f IT/pom.xml \
          -Dbonita.url=${BONITA_URL} \
          -DSMTP_SERVER=greenmail \
          -DSMTP_PORT=3025

      - name: publish test report
        uses: dorny/test-reporter@v1
        if: env.IT_FOLDER_EXISTS == 'true' && (success() || failure())
        with:
          name: JUnit Tests
          path: IT/target/failsafe-reports/**/*.xml,IT/target/surefire-reports/**/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: upload Playwright screenshots
        id: upload-playwright-screenshots
        uses: actions/upload-artifact@v4
        if: env.IT_FOLDER_EXISTS == 'true' && (success() || failure())
        with:
          name: playwright-screenshots-${{ github.run_id }}
          path: ${{ inputs.playwright_screenshots_path }}
          if-no-files-found: ignore
          retention-days: 30

      - name: upload Playwright screenshots summary
        if: env.IT_FOLDER_EXISTS == 'true' && (success() || failure())
        run: |
          echo "## runIT — Playwright Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | playwright-screenshots-${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Path | ${{ inputs.playwright_screenshots_path }} |" >> $GITHUB_STEP_SUMMARY

      - name: upload Bonita test reports
        id: upload-bonita-test-reports
        uses: actions/upload-artifact@v4
        if: env.IT_FOLDER_EXISTS == 'true' && (success() || failure())
        with:
          name: bonita-test-reports-${{ github.run_id }}
          path: IT/target/bonita-test-reports/**
          if-no-files-found: ignore
          retention-days: 30

      - name: upload Bonita test reports summary
        if: env.IT_FOLDER_EXISTS == 'true' && (success() || failure())
        run: |
          echo "## runIT — Bonita Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | bonita-test-reports-${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Path | IT/target/bonita-test-reports/** |" >> $GITHUB_STEP_SUMMARY
