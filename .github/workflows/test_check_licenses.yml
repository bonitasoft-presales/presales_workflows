name: test_check_licenses
on:
  workflow_dispatch:
    inputs:
      bonita_port:
        required: true
        type: string
        default: "8081"
        description: "Port exposing the Bonita healthz endpoint on each server"
      expiration_warning_days:
        required: true
        type: string
        default: "30"
        description: "Warn (expiring soon) when remaining license days is at or below this value"
      expiration_critical_days:
        required: true
        type: string
        default: "7"
        description: "Raise a critical alert when remaining license days is at or below this value"
      fail_on_alert:
        required: true
        type: boolean
        default: true
        description: "Fail the job when at least one server raises a license alert"
      insecure_tls:
        required: true
        type: boolean
        default: true
        description: "Skip TLS certificate verification when a healthz endpoint redirects to HTTPS with a self-signed certificate"

jobs:
  check_licenses:
    uses: ./.github/workflows/reusable_check_licenses.yml
    with:
      bonita_port: ${{ inputs.bonita_port }}
      expiration_warning_days: ${{ inputs.expiration_warning_days }}
      expiration_critical_days: ${{ inputs.expiration_critical_days }}
      fail_on_alert: ${{ inputs.fail_on_alert }}
      insecure_tls: ${{ inputs.insecure_tls }}
    secrets: inherit