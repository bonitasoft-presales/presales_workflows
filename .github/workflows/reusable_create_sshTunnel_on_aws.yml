name: createSshTunnelOnAws
on:
  workflow_call:
    inputs:
      bonita_dns_name:
        required: true
        type: string
        description: "target server, e.g. ec2-3-255-139-245.eu-west-1.compute.amazonaws.com"
      tunnel_script_path:
        required: true
        type: string
        description: "path to the shell script that starts the SSH tunnel (relative to workspace)"
      who_uses_port_script_path:
        required: false
        type: string
        default: "sshTunnel/whoUsesPort.sh"
        description: "path to the whoUsesPort.sh script (relative to workspace)"
      test_script_path:
        required: false
        type: string
        default: "sshTunnel/testConnexion.sh"
        description: "path to the test script (relative to workspace)"
    secrets:
      AWS_PRIVATE_KEY:
        required: true
      AWS_KEY_ID:
        required: true
      AWS_ACCESS_KEY:
        required: true
      AWS_SECURITY_GROUP_ID:
        required: true
      AWS_SSH_USER:
        required: true
      SSH_PUBLIC_KEY_B64:
        required: true
      SSH_PRIVATE_KEY_B64:
        required: true

jobs:
  create_ssh_tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set AWS_PUBLIC_DNS_HOSTNAME env variable
        run: |
          echo "AWS_PUBLIC_DNS_HOSTNAME=${{ inputs.bonita_dns_name }}" >> $GITHUB_ENV
          echo "## createSshTunnelOnAws — Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Target host | ${{ inputs.bonita_dns_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tunnel script | ${{ inputs.tunnel_script_path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| whoUsesPort script | ${{ inputs.who_uses_port_script_path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test script | ${{ inputs.test_script_path }} |" >> $GITHUB_STEP_SUMMARY

      - name: Setup AWS SSH private key
        env:
          PRIVATE_KEY: ${{ secrets.AWS_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > private_key && chmod 600 private_key

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          aws-region: eu-west-1

      - uses: passeidireto/aws-add-ip-to-security-group-action@v1.0.0
        with:
          aws_security_group_ids: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          port_range: '22'

      - name: Check SSH secrets are set
        env:
          SSH_PUBLIC_KEY_B64: ${{ secrets.SSH_PUBLIC_KEY_B64 }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          echo "SSH_PUBLIC_KEY_B64 length: ${#SSH_PUBLIC_KEY_B64}"
          echo "SSH_PRIVATE_KEY_B64 length: ${#SSH_PRIVATE_KEY_B64}"
          [ -n "$SSH_PUBLIC_KEY_B64" ] || { echo "ERROR: SSH_PUBLIC_KEY_B64 is empty"; exit 1; }
          [ -n "$SSH_PRIVATE_KEY_B64" ] || { echo "ERROR: SSH_PRIVATE_KEY_B64 is empty"; exit 1; }

      - name: Decode SSH keys
        env:
          SSH_PUBLIC_KEY_B64: ${{ secrets.SSH_PUBLIC_KEY_B64 }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          echo "$SSH_PUBLIC_KEY_B64" | base64 --decode > tunnel_key.pub
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode > tunnel_key
          chmod 600 tunnel_key
          chmod 644 tunnel_key.pub
          echo "tunnel_key size: $(wc -c < tunnel_key) bytes"
          echo "tunnel_key.pub size: $(wc -c < tunnel_key.pub) bytes"

      - name: Transfer SSH keys to remote instance
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME} 'mkdir -p ~/.ssh && chmod 700 ~/.ssh'
          scp -o StrictHostKeyChecking=no -i private_key tunnel_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME}:~/.ssh/tunnel_key
          scp -o StrictHostKeyChecking=no -i private_key tunnel_key.pub ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME}:~/.ssh/tunnel_key.pub
          ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME} '
            chmod 600 ~/.ssh/tunnel_key
            chmod 644 ~/.ssh/tunnel_key.pub
          '
          echo "## createSshTunnelOnAws — SSH Keys Transfer" >> $GITHUB_STEP_SUMMARY
          echo "| File | Destination | Permissions |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| tunnel_key | ~/.ssh/tunnel_key | 600 |" >> $GITHUB_STEP_SUMMARY
          echo "| tunnel_key.pub | ~/.ssh/tunnel_key.pub | 644 |" >> $GITHUB_STEP_SUMMARY

      - name: Transfer tunnel script and tools
        run: |
          scp -o StrictHostKeyChecking=no -i private_key ${{ github.workspace }}/${{ inputs.tunnel_script_path }} ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME}:~/start_tunnel.sh
          scp -o StrictHostKeyChecking=no -i private_key ${{ github.workspace }}/${{ inputs.who_uses_port_script_path }} ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME}:~/whoUsesPort.sh
          scp -o StrictHostKeyChecking=no -i private_key ${{ github.workspace }}/${{ inputs.test_script_path }} ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME}:~/testConnexion.sh
          ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME} 'chmod +x ~/start_tunnel.sh ~/whoUsesPort.sh ~/testConnexion.sh'

      - name: Start SSH tunnel
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME} '~/start_tunnel.sh'
          echo "## createSshTunnelOnAws — Tunnel Started" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Host | ${AWS_PUBLIC_DNS_HOSTNAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script | ~/start_tunnel.sh |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ started |" >> $GITHUB_STEP_SUMMARY

      - name: Check port usage on remote instance
        if: always()
        run: |
          PORT_INFO=$(ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME} '~/whoUsesPort.sh 9090')
          echo "$PORT_INFO"
          echo "## createSshTunnelOnAws — Port 9090 Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$PORT_INFO" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run test connection script
        if: always()
        run: |
          TEST_INFO=$(ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.AWS_SSH_USER }}@${AWS_PUBLIC_DNS_HOSTNAME} '~/testConnexion.sh')
          echo "$TEST_INFO"
          echo "## createSshTunnelOnAws — Test Connection" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$TEST_INFO" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
